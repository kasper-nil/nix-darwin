[mgr]
ratio = [1, 3, 4]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"

[preview]
wrap = "yes"
tab_size = 4

# Git status fetchers
[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"