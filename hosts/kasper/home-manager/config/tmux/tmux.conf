# ~/.tmux.conf — minimal setup

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# ─── Core QoL ────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Claude Code passthrough ────────────────────────────────
set -g allow-passthrough on
set -ga update-environment TERM_PROGRAM

# ─── Theme: Catppuccin Mocha ────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8]%H:%M #[fg=#89b4fa]│ #[fg=#a6adc8]%d %b "
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "
set -g message-style "bg=#313244,fg=#cdd6f4"

# ─── Session persistence ────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Plugins
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Status bar
set -g status-right "#{cpu_fg_color}CPU #{cpu_percentage} #[fg=#a6adc8]│ RAM #{ram_percentage} │ %H:%M │ %d %b "

run '~/.config/tmux/plugins/tpm/tpm'
