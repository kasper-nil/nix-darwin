# ============================================================================
# kitty.conf — migrated from WezTerm. Used by normal kitty windows AND the
# quake/quick-access dropdown (which inherits this file).
# ============================================================================

# ── Font ─────────────────────────────────────────────────────
font_family      MesloLGS Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# ── Window ───────────────────────────────────────────────────
# borderless-ish, still resizable (~WezTerm "RESIZE")
hide_window_decorations titlebar-only
# padding order: top right bottom left
window_padding_width    4 8 4 8
background_opacity      1.0
background_blur         0
confirm_os_window_close 0
macos_quit_when_last_window_closed no
macos_titlebar_color    background

# ── Rendering / scrollback ───────────────────────────────────
sync_to_monitor  yes
scrollback_lines 10000
enable_audio_bell no

# ── macOS option key (left composes é/ü…, right = Alt/Meta) ───
macos_option_as_alt right

# ── Mouse ────────────────────────────────────────────────────
# Focus the kitty pane/window under the mouse pointer (within kitty).
focus_follows_mouse yes

# ── Tab bar ──────────────────────────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
# always show the tab bar (set to 2 to hide it when only one tab)
tab_bar_min_tabs    1
tab_title_template  " {index}: {title} "
active_tab_font_style bold

# ── Layouts (splits = panes; stack = zoom one) ───────────────
enabled_layouts splits,stack

# ── Keybindings (mirror your WezTerm CMD keys) ───────────────
map cmd+k          clear_terminal clear active
# pane (split) navigation
map cmd+left       neighboring_window left
map cmd+right      neighboring_window right
map cmd+up         neighboring_window up
map cmd+down       neighboring_window down
# pane resize
map cmd+shift+left  resize_window narrower
map cmd+shift+right resize_window wider
map cmd+shift+up    resize_window taller
map cmd+shift+down  resize_window shorter
# split (like cmd+p smart-split) / close pane
map cmd+p          launch --location=split --cwd=current
map cmd+w          close_window
# tabs
map cmd+t          new_tab_with_cwd
map cmd+1          goto_tab 1
map cmd+2          goto_tab 2
map cmd+3          goto_tab 3
map cmd+4          goto_tab 4
map cmd+5          goto_tab 5
map cmd+6          goto_tab 6
map cmd+7          goto_tab 7
map cmd+8          goto_tab 8
map cmd+9          goto_tab 9
map cmd+shift+[    move_tab_backward
map cmd+shift+]    move_tab_forward
# move active tab to absolute position N (WezTerm MoveTab) — custom kitten
map cmd+shift+1    kitten move_tab_to.py 1
map cmd+shift+2    kitten move_tab_to.py 2
map cmd+shift+3    kitten move_tab_to.py 3
map cmd+shift+4    kitten move_tab_to.py 4
map cmd+shift+5    kitten move_tab_to.py 5
map cmd+shift+6    kitten move_tab_to.py 6
map cmd+shift+7    kitten move_tab_to.py 7
map cmd+shift+8    kitten move_tab_to.py 8
map cmd+shift+9    kitten move_tab_to.py 9

# ── Theme ────────────────────────────────────────────────────
include mocha.conf
